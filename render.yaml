services:
  - type: web
    name: full-bazar-api
    runtime: python
    rootDir: python/fastapi_app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FEEDBACK_CHAT_ID
        sync: false
      - key: MODEL_PATH
        value: ""
    plan: free
