telemetry:
  enabled: false

# Use PostgreSQL so webserver + daemon share the same state reliably.
# SQLite cannot handle concurrent access from two containers on a shared volume.
storage:
  postgres:
    postgres_db:
      username: postgres
      password: postgres
      hostname: postgres
      db_name: dagster_db
      port: 5432

run_monitoring:
  enabled: true
  # 0 = immediately mark interrupted runs as FAILED on daemon restart (don't retry).
  # Prevents stuck STARTED runs from blocking the QueuedRunCoordinator indefinitely.
  max_resume_run_attempts: 0
  poll_interval_seconds: 30
  start_timeout_seconds: 180
  # Hard-cancel any run exceeding 30 min (1800s) — jobs complete in <15 min normally.
  max_runtime_seconds: 1800
  # Free the queue slot immediately when a run ends.
  free_slots_after_run_end_seconds: 0

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 1
    dequeue_interval_seconds: 30
