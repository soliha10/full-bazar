name: Scrape & Sync to Supabase

on:
  schedule:
    # Kuniga 4 marta: 00:00, 06:00, 12:00, 18:00 (UTC) = 05:00, 11:00, 17:00, 23:00 (Toshkent)
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch: # Qo'lda ham ishga tushirish mumkin

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install scraper dependencies
        run: |
          pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.2.2 psycopg2-binary==2.9.9

      - name: Run all scrapers
        working-directory: python/dagster_app
        run: |
          mkdir -p ../../data
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from scrapers import ALL_SCRAPERS
          import logging
          logging.basicConfig(level=logging.INFO)
          results = []
          for cls in ALL_SCRAPERS:
              try:
                  print(f'[{cls.store_name}] Starting...', flush=True)
                  s = cls(output_dir='../../data', delay=0.5)
                  count = s.run()
                  results.append((cls.store_name, count, 'OK'))
                  print(f'[{cls.store_name}] Done: {count} products', flush=True)
              except Exception as e:
                  results.append((cls.store_name, 0, str(e)))
                  print(f'[{cls.store_name}] ERROR: {e}', flush=True)
          print('\n=== SCRAPE SUMMARY ===')
          for name, count, status in results:
              print(f'{name}: {count} ({status})')
          print(f'Total scrapers: {len(results)}')
          "

      - name: Sync CSV data to Supabase
        env:
          PRODUCTS_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DATA_DIR: ./data
        run: |
          python python/sync_csv.py

      - name: Report results
        run: |
          echo "Scrape & Sync completed at $(date)"
