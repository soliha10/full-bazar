name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/full-bazar
            git pull origin main
            docker compose build --no-cache frontend
            docker compose up -d --force-recreate --no-deps frontend
            docker compose up --build -d
            sleep 3
            echo "=== frontend status ==="
            docker inspect full-bazar-frontend-1 --format 'running={{.State.Running}} status={{.State.Status}}'
            echo "=== nginx logs ==="
            docker logs full-bazar-frontend-1 --tail=5
            echo "=== built assets ==="
            docker exec full-bazar-frontend-1 ls /usr/share/nginx/html/assets/ | head -5
