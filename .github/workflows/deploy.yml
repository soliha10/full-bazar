name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "=== adding local SSH key for direct access ==="
            mkdir -p ~/.ssh
            echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILN+kd4RfB8nzTRb3Z+xJYciXbannPAAq3DQjPaUJi3c" >> ~/.ssh/authorized_keys
            sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys

            echo "=== EMERGENCY: stopping MLflow crash loop ==="
            docker stop full-bazar-mlflow-1 2>/dev/null || true
            docker rm full-bazar-mlflow-1 2>/dev/null || true

            echo "=== stopping all dagster to free memory ==="
            docker stop full-bazar-dagster-daemon-1 full-bazar-dagster-webserver-1 2>/dev/null || true

            cd /home/${{ secrets.SERVER_USER }}/full-bazar
            git fetch origin main
            git reset --hard origin/main

            echo "=== ensuring postgres is healthy ==="
            docker compose up -d --no-build postgres
            until docker exec full-bazar-postgres-1 pg_isready -U postgres -d fullbazar -q; do sleep 2; done

            echo "=== applying DB migrations ==="
            docker exec full-bazar-postgres-1 psql -U postgres -d fullbazar -c "
              CREATE TABLE IF NOT EXISTS user_events (
                id BIGSERIAL PRIMARY KEY,
                session_id VARCHAR(64) NOT NULL,
                event_type VARCHAR(20) NOT NULL,
                product_id VARCHAR(60),
                search_query TEXT,
                created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
              );
              CREATE INDEX IF NOT EXISTS idx_user_events_session ON user_events(session_id, created_at DESC);
              CREATE INDEX IF NOT EXISTS idx_user_events_product ON user_events(product_id);
              ALTER TABLE user_events DROP CONSTRAINT IF EXISTS user_events_product_id_fkey;
            "

            echo "=== stopping dagster ==="
            docker compose stop dagster-daemon dagster-webserver || true

            echo "=== cancelling ALL non-terminal Dagster runs (SQLite) ==="
            docker run --rm -v full-bazar_dagster_home:/opt/dagster/home python:3.11-alpine python3 -c "import sqlite3; c=sqlite3.connect('/opt/dagster/home/history/runs.db'); r=c.execute(\"UPDATE runs SET status='CANCELED' WHERE status IN ('STARTED','QUEUED','STARTING','CANCELING')\"); c.commit(); print('Cancelled', r.rowcount, 'runs'); c.close()" 2>/dev/null || echo "SQLite cancel skipped"

            echo "=== building frontend (no cache) ==="
            docker compose build --no-cache frontend

            echo "=== building fastapi ==="
            docker compose build fastapi

            echo "=== restarting frontend, fastapi ==="
            docker compose up -d --force-recreate --no-deps frontend fastapi

            echo "=== bringing up mlflow ==="
            docker compose up -d --no-build mlflow

            echo "=== building dagster ==="
            docker compose build dagster-daemon dagster-webserver

            echo "=== starting fresh dagster ==="
            docker compose up -d --force-recreate --no-deps dagster-daemon dagster-webserver

            echo "=== waiting for dagster webserver to be ready ==="
            sleep 15
            until curl -s http://localhost:3000/server_info -o /dev/null 2>/dev/null; do
              echo "  waiting..."; sleep 3
            done
            echo "dagster webserver is up"

            echo "=== launching csv_sync_job to verify pipeline ==="
            docker exec full-bazar-dagster-webserver-1 \
              dagster job execute -f /app/definitions.py -j csv_sync_job \
              && echo "csv_sync_job SUCCESS" || echo "csv_sync_job FAILED (check dagster UI)"

            echo "=== deploy status ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep full-bazar
            curl -s -o /dev/null -w "site: HTTP %{http_code}\n" http://localhost:80
            curl -s -o /dev/null -w "api:  HTTP %{http_code}\n" http://localhost:8000/health
