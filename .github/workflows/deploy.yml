name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/full-bazar
            git fetch origin main
            git reset --hard origin/main

            echo "=== ensuring postgres is healthy ==="
            docker compose up -d --no-build postgres
            until docker exec full-bazar-postgres-1 pg_isready -U postgres -d fullbazar -q; do sleep 2; done

            echo "=== applying DB migrations ==="
            docker exec full-bazar-postgres-1 psql -U postgres -d fullbazar -c "
              CREATE TABLE IF NOT EXISTS user_events (
                id BIGSERIAL PRIMARY KEY,
                session_id VARCHAR(64) NOT NULL,
                event_type VARCHAR(20) NOT NULL,
                product_id VARCHAR(60),
                search_query TEXT,
                created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
              );
              CREATE INDEX IF NOT EXISTS idx_user_events_session ON user_events(session_id, created_at DESC);
              CREATE INDEX IF NOT EXISTS idx_user_events_product ON user_events(product_id);
              ALTER TABLE user_events DROP CONSTRAINT IF EXISTS user_events_product_id_fkey;
            "

            echo "=== cancelling stuck Dagster STARTED runs (older than 30 min) ==="
            docker exec full-bazar-postgres-1 psql -U postgres -d dagster_db -c "
              UPDATE runs
              SET status = 'CANCELED'
              WHERE status = 'STARTED'
                AND create_timestamp < EXTRACT(EPOCH FROM (NOW() - INTERVAL '30 minutes'));
            " 2>/dev/null && echo "Stuck runs cancelled" || echo "dagster_db not ready, skipping"

            echo "=== building frontend (no cache) ==="
            docker compose build --no-cache frontend

            echo "=== building fastapi ==="
            docker compose build fastapi

            echo "=== restarting frontend, fastapi ==="
            docker compose up -d --force-recreate --no-deps frontend fastapi

            echo "=== bringing up mlflow ==="
            docker compose up -d --no-build mlflow

            echo "=== restarting dagster ==="
            docker compose up -d --force-recreate --no-deps --no-build dagster-daemon dagster-webserver

            echo "=== syncing CSV data to PostgreSQL ==="
            sleep 5
            docker compose run --rm --no-deps dagster-webserver python -c "import sys,os;sys.path.insert(0,'/app');from definitions import _run_sync;n_p,n_m=_run_sync(os.getenv('DATA_DIR','/opt/dagster/data'),os.getenv('PRODUCTS_DB_URL','postgresql://postgres:postgres@postgres:5432/fullbazar'),None);print(f'Synced {n_p} products, {n_m} markets')"

            echo "=== deploy status ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep full-bazar
            curl -s -o /dev/null -w "site: HTTP %{http_code}\n" http://localhost:80
            curl -s -o /dev/null -w "api:  HTTP %{http_code}\n" http://localhost:8000/health
