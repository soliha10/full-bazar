name: Trigger Full Scrape

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger product_sync_job on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 60m
          script: |
            echo "=== Triggering full scrape via Dagster GraphQL ==="
            curl -s -X POST http://localhost:3000/graphql \
              -H "Content-Type: application/json" \
              -d '{
                "query": "mutation LaunchRun { launchRun(executionParams: { selector: { repositoryLocationName: \"dagster_app.definitions\", repositoryName: \"__repository__\", jobName: \"product_sync_job\" }, runConfigData: {} }) { __typename ... on LaunchRunSuccess { run { runId status } } ... on PythonError { message } } }"
              }' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d)"
            echo "=== Scrape job launched (runs in background) ==="
