# ─────────────────────────────────────────────────────────────────────────────
# Full-Bazar infrastructure
#
# Services:
#   postgres          — PostgreSQL 15 (fullbazar + dagster_db databases)
#   fastapi           — Python FastAPI reads from PostgreSQL
#   frontend          — React built at startup, served by nginx on port 80
#   dagster-webserver — Dagster UI on port 3000
#   dagster-daemon    — runs hourly schedule (replaces Airflow)
#   mlflow            — ML experiment tracking (1 worker, 400 MB limit)
# ─────────────────────────────────────────────────────────────────────────────

x-dagster-common: &dagster-common
  build:
    context: ./python/dagster_app
    dockerfile: Dockerfile
  environment:
    DAGSTER_HOME: /opt/dagster/home
    PRODUCTS_DB_URL: postgresql://postgres:postgres@postgres:5432/fullbazar
    DAGSTER_DB_URL: postgresql://postgres:postgres@postgres:5432/dagster_db
    DATA_DIR: /opt/dagster/data
    MLFLOW_TRACKING_URI: http://mlflow:5000
    ML_TASKS_DIR: /opt/dagster/ml_tasks
  volumes:
    - dagster_home:/opt/dagster/home
    - ./data:/opt/dagster/data
    - ./python/ml_tasks:/opt/dagster/ml_tasks:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullbazar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./python/init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullbazar"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  fastapi:
    build:
      context: ./python/fastapi_app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fullbazar
      MODEL_PATH: /app/data/models/best_matcher.pkl
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 200m

  # ── Frontend (React → nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - fastapi
    mem_limit: 64m

  # ── Dagster webserver (UI) ──────────────────────────────────────────────────
  dagster-webserver:
    <<: *dagster-common
    restart: unless-stopped
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /app/workspace.yaml
    ports:
      - "3000:3000"
    mem_limit: 384m

  # ── Dagster daemon (runs hourly schedule) ───────────────────────────────────
  dagster-daemon:
    <<: *dagster-common
    restart: unless-stopped
    command: dagster-daemon run
    mem_limit: 1200m

  # ── MLflow (Tracking Server) ────────────────────────────────────────────────
  mlflow:
    build:
      context: ./python/mlflow_app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MLFLOW_PG_HOST: postgres
      MLFLOW_PG_USER: postgres
      MLFLOW_PG_PASSWORD: postgres
      MLFLOW_PG_DB: mlflow
    # Dedicated `mlflow` database prevents Alembic schema conflicts with app tables.
    # --allowed-hosts "*" lets dagster/fastapi reach mlflow across Docker network.
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql://postgres:postgres@postgres:5432/mlflow
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --workers
      - "1"
      - --allowed-hosts
      - "*"
    ports:
      - "5050:5000"
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 300m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  dagster_home:
  mlflow_data:
