# ─────────────────────────────────────────────────────────────────────────────
# Full-Bazar infrastructure
#
# Services:
#   postgres          — shared PostgreSQL 15 (fullbazar + airflow_db databases)
#   fastapi           — Python FastAPI that reads from PostgreSQL
#   frontend          — React app built at startup, served by nginx on port 80
#   airflow-init      — one-shot: initialises Airflow DB and creates admin user
#   airflow-scheduler — runs DAGs (LocalExecutor, no Redis/Celery needed)
#   airflow-webserver — Airflow UI on port 8080
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.12
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # ── env vars forwarded to the DAG ──────────────────────────────────────
    PRODUCTS_DB_URL: postgresql://postgres:postgres@postgres:5432/fullbazar
    DATA_DIR: /opt/airflow/data
  volumes:
    - ./python/dags:/opt/airflow/dags
    - ./data:/opt/airflow/data:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullbazar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./python/init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullbazar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  fastapi:
    build:
      context: ./python/fastapi_app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fullbazar
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React → nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - fastapi

  # ── Airflow init (runs once) ────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fullbazar.local || true
    restart: "no"

  # ── Airflow scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  airflow_logs:
