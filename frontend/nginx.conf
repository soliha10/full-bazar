server {
    listen 80;
    server_name bazarcom.online www.bazarcom.online;
    return 301 https://bazarcom.online$request_uri;
}

server {
    listen 443 ssl;
    server_name bazarcom.online www.bazarcom.online;

    ssl_certificate     /etc/letsencrypt/live/bazarcom.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bazarcom.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://fastapi:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
